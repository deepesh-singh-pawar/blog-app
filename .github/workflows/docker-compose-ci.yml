name: Docker Compose CI with Trivy Scan

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          push: ${{ github.event_name != 'pull_request' }}
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }},blog-app:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        scan-ref: 'blog-app:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Build and start services with Docker Compose
      run: |
        docker-compose up -d --build
        docker-compose ps

    - name: Wait for services to be healthy
      run: |
        timeout=300
        while [ $timeout -gt 0 ]; do
          if docker-compose ps | grep -q "healthy"; then
            echo "Services are healthy"
            break
          fi
          echo "Waiting for services to be healthy..."
          sleep 10
          timeout=$((timeout - 10))
        done
        if [ $timeout -le 0 ]; then
          echo "Services failed to become healthy"
          docker-compose logs
          exit 1
        fi

    - name: Run tests
      run: |
        # Add your test commands here
        # For example:
        # docker-compose exec blog python -m pytest
        echo "Running placeholder tests - replace with actual test commands"
        docker-compose exec blog python -c "import app; print('App imports successfully')"

    - name: Stop services
      if: always()
      run: docker-compose down