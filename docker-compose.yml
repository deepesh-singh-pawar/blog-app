version: "3.9"

services:

  # ── Blog app ────────────────────────────────────────────────────────────────
  blog:
    build: .
    container_name: blog-app
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "super-secret-change-in-production"
      DATABASE_URL: "sqlite:////data/blog.db"
      FLASK_ENV: "production"
    volumes:
      - blog_data:/data        # SQLite database persists here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  blog_data:
    driver: local


