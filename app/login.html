{% extends "base.html" %}
{% block title %}Login — Blog{% endblock %}
{% block content %}

<div class="auth-card">
  <div class="card">
    <h1 class="card-title page-heading" style="text-align:center;margin-bottom:24px">Log in</h1>

    <form method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Your password" required>
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit">Log in</button>
    </form>

    <p class="auth-link">
      No account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
    <p class="auth-link" style="margin-top:8px;font-size:13px;color:#999">
      Demo: demo@example.com / password123
    </p>
  </div>
</div>

{% endblock %}
