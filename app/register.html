{% extends "base.html" %}
{% block title %}Register — Blog{% endblock %}
{% block content %}

<div class="auth-card">
  <div class="card">
    <h1 class="page-heading" style="text-align:center;margin-bottom:24px">Create account</h1>

    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:#888;font-weight:400">(min 6 chars)</span></label>
        <input type="password" id="password" name="password"
               placeholder="Choose a password" required minlength="6">
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit">Register</button>
    </form>

    <p class="auth-link">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>

{% endblock %}
